services:
  physics-animations:
    image: ${PHYSICS_ANIMATIONS_IMAGE:-ghcr.io/tdcasual/physicsanimations:latest}
    build:
      context: .
      target: ${PHYSICS_ANIMATIONS_BUILD_TARGET:-runtime}
    container_name: physics-animations
    ports:
      - "4173:4173"
    environment:
      PORT: 4173
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_HASH: your_bcrypt_hash
      JWT_SECRET: replace_with_long_random_secret
      LIBRARY_GGB_ENABLE_ONLINE_FALLBACK: "true"
    volumes:
      - ./content:/app/content
    restart: unless-stopped

  ggb-updater:
    image: ${PHYSICS_ANIMATIONS_IMAGE:-ghcr.io/tdcasual/physicsanimations:latest}
    profiles:
      - maintenance
    working_dir: /app
    entrypoint:
      - /bin/sh
      - -lc
      - ./scripts/run_geogebra_updater.sh
    environment:
      ROOT_DIR: /app
      GGB_BUNDLE_URL: https://download.geogebra.org/package/geogebra-math-apps-bundle
      GGB_RETAIN_RELEASES: "3"
      GGB_NO_LOCK: "false"
    volumes:
      - ./content:/app/content
    restart: "no"
