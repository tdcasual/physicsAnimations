name: Build Docker image

on:
  push:
    paths-ignore:
      - "README.md"
  pull_request:
    paths-ignore:
      - "README.md"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-qa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright runtime dependencies
        run: npm run install-playwright-deps

      - name: Run qa release gate
        run: npm run qa:release

  build:
    needs:
      - verify-qa
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch || (github.event_name == 'workflow_dispatch' && inputs.push_image == true)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch || (github.event_name == 'workflow_dispatch' && inputs.push_image == true) }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
